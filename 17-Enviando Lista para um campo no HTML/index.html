<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enviando Lista para um campo no HTML</title>
</head>
<body>

    <h2>Nomes Digitados</h2>
    <ul id="listaNomes"></ul>
    
    <select id="selectNomes">
        <option value="">Selecione um nome</option>
    </select>

    <script>
        let nomes = [];

        for(let i = 0; i < 3; i++){
            let nome = prompt("Digite o nome " + (i + 1) + ":");
            nomes.push(nome);
        }

        let lista = document.getElementById("listaNomes");
        for(let i = 0; i < nomes.length; i++){
            let item = document.createElement("li");
            item.innerText = nomes[i];
            lista.appendChild(item);
        }

        let selectNomes = document.getElementById("selectNomes");
        for (let i = 0; i < nomes.length; i++){
            let opcao = document.createElement("option");
            opcao.innerText = nomes[i];
            opcao.value = nomes[i];
            selectNomes.appendChild(opcao);
        }
    </script>
</body>
</html>
